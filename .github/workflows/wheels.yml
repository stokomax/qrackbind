name: Build and publish wheels

on:
  push:
    tags:
      - "v*"
    branches:
      - "ci/**"
  workflow_dispatch:

jobs:
  check_stubs:
    name: Check stub freshness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qrack (CPU-only source build)
        run: bash scripts/install_qrack.sh --cpu

      - name: Install build deps
        run: pip install nanobind scikit-build-core

      - name: Build and install qrackbind
        run: pip install --no-build-isolation -e .

      - name: Regenerate stubs
        run: |
          python -m nanobind.stubgen \
            -m qrackbind._core \
            --include-private \
            -O /tmp/stubs_fresh

      - name: Fail if committed stub differs from generated stub
        run: |
          diff src/qrackbind/_core.pyi /tmp/stubs_fresh/_core.pyi \
            || (echo "::error::_core.pyi is out of date. Run 'just stubs' locally and commit the result." && exit 1)

  build_wheels:
    name: Build wheels (Linux x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          # Stable ABI means one wheel covers Python 3.12+ — build cp312 only.
          CIBW_BUILD: "cp312-manylinux_x86_64"
          # manylinux_2_34 (AlmaLinux 9, glibc 2.34). The pre-built archive was
          # compiled on glibc 2.39 and references __isoc23_strtol (unversioned,
          # glibc 2.38+), which auditwheel cannot detect. We build from source
          # instead so the library uses only glibc 2.34 symbols.
          CIBW_MANYLINUX_X86_64_IMAGE: "quay.io/pypa/manylinux_2_34_x86_64"
          CIBW_BEFORE_ALL: >
            dnf install -y cmake git ninja-build ocl-icd-devel vim-common &&
            curl -fsSL https://raw.githubusercontent.com/KhronosGroup/OpenCL-CLHPP/v2.0.16/include/CL/opencl.hpp
            -o /usr/include/CL/opencl.hpp &&
            git clone --depth 1 --branch vm6502q.v10.7.0
            https://github.com/unitaryfoundation/qrack.git /tmp/qrack_src &&
            cmake -B /tmp/qrack_build -S /tmp/qrack_src -G Ninja
            -DCMAKE_BUILD_TYPE=Release -DENABLE_OPENCL=ON -DENABLE_CUDA=OFF
            -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=/usr/local &&
            cmake --build /tmp/qrack_build --parallel $(nproc) &&
            cmake --install /tmp/qrack_build &&
            ldconfig
          CIBW_ENVIRONMENT: >
            QRACK_LIB_DIR=/usr/local/lib
            QRACK_INCLUDE_DIR=/usr/local/include/qrack
          # Run a quick smoke-test after each wheel is built.
          CIBW_TEST_COMMAND: >
            python -c "from qrackbind import QrackSimulator;
            s = QrackSimulator(qubitCount=1); s.h(0); print('smoke test OK')"

      - name: Retag wheel for multi-version abi3 compatibility
        run: |
          python3 -m pip install wheel
          for w in wheelhouse/*.whl; do
            echo "retagging $w"
            python3 -m wheel tags --python-tag '+cp313.cp314' --remove "$w"
          done

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: ./wheelhouse/*.whl

  # ── Release ───────────────────────────────────────────────────────────────────
  github_release:
    name: Publish to GitHub Releases
    needs: build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist/

      - name: Upload wheels to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
