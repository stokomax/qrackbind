name: Build and publish wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels (Linux x86_64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21.3
        env:
          # Stable ABI means one wheel covers Python 3.12+ — build cp312 only.
          CIBW_BUILD: "cp312-manylinux_x86_64"
          # manylinux_2_34 (AlmaLinux 9, glibc 2.34). The pre-built archive was
          # compiled on glibc 2.39 and references __isoc23_strtol (unversioned,
          # glibc 2.38+), which auditwheel cannot detect. We build from source
          # instead so the library uses only glibc 2.34 symbols.
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_34"
          CIBW_BEFORE_ALL: >
            dnf install -y cmake git ninja-build ocl-icd-devel vim-common &&
            curl -fsSL https://raw.githubusercontent.com/KhronosGroup/OpenCL-CLHPP/v2.0.16/include/CL/opencl.hpp
            -o /usr/include/CL/opencl.hpp &&
            git clone --depth 1 --branch vm6502q.v10.7.0
            https://github.com/unitaryfoundation/qrack.git /tmp/qrack_src &&
            cmake -B /tmp/qrack_build -S /tmp/qrack_src -G Ninja
            -DCMAKE_BUILD_TYPE=Release -DENABLE_OPENCL=ON -DENABLE_CUDA=OFF
            -DBUILD_SHARED_LIBS=OFF -DCMAKE_INSTALL_PREFIX=/usr/local &&
            cmake --build /tmp/qrack_build --parallel 4 &&
            cmake --install /tmp/qrack_build &&
            ldconfig
          CIBW_ENVIRONMENT: >
            QRACK_LIB_DIR=/usr/local/lib
            QRACK_INCLUDE_DIR=/usr/local/include/qrack
          # Run a quick smoke-test after each wheel is built.
          CIBW_TEST_COMMAND: >
            python -c "from qrackbind import QrackSimulator;
            s = QrackSimulator(qubitCount=1); s.h(0); print('smoke test OK')"

      - name: Retag wheel for multi-version abi3 compatibility
        run: |
          python3 -m pip install wheel
          for w in wheelhouse/*.whl; do
            echo "retagging $w"
            python3 -m wheel tags --python-tag '+cp313.cp314' --remove "$w"
          done

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels
          path: ./wheelhouse/*.whl

  # ── Publish ──────────────────────────────────────────────────────────────────
  # TODO: change environment from 'testpypi' to 'pypi' and update repository-url
  #       when you are ready to publish to production PyPI.
  #
  # Setup required on TestPyPI (https://test.pypi.org):
  #   1. Create a project named 'qrackbind'
  #   2. Add a Trusted Publisher: GitHub Actions, repo stokomax/qrackbind,
  #      workflow wheels.yml, environment testpypi
  publish:
    name: Publish to TestPyPI
    needs: build_wheels
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: testpypi
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
